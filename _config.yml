# Site Settings
locale: "en-US"
title: "Boxin Zhao"
title_separator: "-"
name: &name "Boxin Zhao"
description: &description "Member of Research Staff / The Voleon Group"
url: https://boxinz17.github.io
baseurl: ""
repository: "boxinz17/boxinz17.github.io"
teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
comments:
  provider: false

# Remote theme — uses the academicpages template
remote_theme: academicpages/academicpages.github.io

# SEO Related
google_site_verification:
bing_site_verification:

# Social Sharing
og_image:

# Analytics
analytics:
  provider: false

# Site Author — controls the left sidebar
author:
  name: "Boxin Zhao"
  avatar: "profile.jpg"
  bio: "Member of Research Staff / The Voleon Group"
  location: "New York, NY"
  employer: The Voleon Group
  googlescholar: "https://scholar.google.com/citations?user=qwSDxikAAAAJ&hl=en"
  email: "bzhaoscholar@gmail.com"
  uri:
  github: "boxinz17"
  linkedin: "https://www.linkedin.com/in/boxin-zhao-733a31a3"
  twitter:
  orcid:

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  teaching:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/New_York

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-remote-theme

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-remote-theme

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
